on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: "wiki-ner", path: "./wiki-NER", ecr_repo: "c22-dv-wiki-ner-repo", type: "lambda", lambda_name: "c22-dv-wiki-ner-lambda" }
          - { name: "cluster", path: "./claims_clustering", ecr_repo: "c22-dv-cluster-image", type: "lambda", lambda_name: "c22-dv-cluster-lambda" }
          - { name: "url-scraper", path: "./url_scraper", ecr_repo: "c22-dv-url-scraper-repo", type: "lambda", lambda_name: "c22-dv-url-scraper-lambda"  }
          - { name: "rag", path: "./rss_pipeline/rag", ecr_repo: "c22-dv-rag-image", type: "lambda", lambda_name: "c22-dv-rag-lambda"  }
          - { name: "rss-pipeline", path: "./rss_pipeline", ecr_repo: "c22-dv-pipeline-image", type: "lambda", lambda_name: "c22-dv-pipeline-lambda"  }
          - { 
              name: "streamlit", 
              type: "ecs", 
              path: "./streamlit", 
              ecr_repo: "c22-dv-streamlit-image", 
              ecs_cluster: "c22-dv-dashboard-cluster", 
              ecs_service: "c22-dv-dashboard-service", 
              container_name: "dashboard-container",
              task_definition: "c22-dv-dashboard-task"
            }
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: 129033205317.dkr.ecr.eu-west-2.amazonaws.com
          ECR_REPOSITORY: ${{ matrix.service.ecr_repo }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Ensure repo exists (from your script)
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY

          # 2. Build with explicit platform (important for Lambda/ECS)
          docker build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            ${{ matrix.service.path }}

          # 3. Push both tags
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to Lambda
        if: matrix.service.type == 'lambda'
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.service.lambda_name }} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecr_repo }}:${{ github.sha }}
          
      # 1. Download the current task definition (or keep a copy in your repo)
      - name: Download Task Definition
        if: matrix.service.type == 'ecs'
        run: |
          aws ecs describe-task-definition --task-definition ${{ matrix.service.task_definition }} --query taskDefinition > task-definition.json

      # 2. Update the JSON with the new image ID
      - name: Fill in the new image ID in the Amazon ECS task definition
        if: matrix.service.type == 'ecs'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.service.container_name }}
          image: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service.ecr_repo }}:${{ github.sha }}

      # 3. Deploy the new Task Definition to the Service
      - name: Deploy Amazon ECS task definition
        if: matrix.service.type == 'ecs'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ matrix.service.ecs_service }}
          cluster: ${{ matrix.service.ecs_cluster }}
          wait-for-service-stability: true
          force-new-deployment: true


          